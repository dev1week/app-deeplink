<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to App Issuance</title>
    <meta
      name="description"
      content="You will be redirected to app issuance shortly. If the app is not installed, you will be redirected to the install page."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-live="polite">
        <div class="logo-wrap">
          <img
            class="logo-image"
            src="https://cdn.iconscout.com/icon/free/png-256/free-best-buy-logo-icon-svg-download-png-1580035.png"
            alt="Best Buy logo"
            loading="eager"
            decoding="async"
          />
        </div>

        <h1 class="title">Redirecting to App Issuance</h1>
        <p class="desc">
          Please wait for a moment.<br />
          <strong>The app will open automatically shortly.</strong>
        </p>

        <div class="loader" role="status" aria-label="Loading"></div>

        <div class="actions">
          <button id="openNowBtn" class="btn primary" type="button">
            Open Now
          </button>
          <button id="installBtn" class="btn ghost" type="button">
            Install App
          </button>
        </div>

        <p class="footnote">
          If auto-redirect does not work, press <strong>Open Now</strong>.
        </p>
      </section>
    </main>

    <script src="./script.js?v=20260319-3"></script>
  </body>
</html>
